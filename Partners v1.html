<body>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="partners-v1.jsx"></script>
  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="partners-page"
            title="SanctumSpace · Partners page"
            subtitle="Locked direction: 02 Architectural. Sage primary, Cormorant Garamond display, Inter body. Single direction. Click an artboard to focus fullscreen — pan with drag, zoom with scroll."
          >
            <DCArtboard id="desktop" label="Desktop · 1440 × full scroll" width={1440} height={4320}>
              <PartnersDesktop />
            </DCArtboard>
            <DCArtboard id="mobile" label="Mobile · 390 × full scroll" width={390} height={3680}>
              <PartnersMobile />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
